<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TIME 3×11 Scroll + Zoom + RESPO‑Viewer</title>

<style>
  .toolbar {
    width: 100%;
    text-align: center;
    margin: 10px 0;
  }
  .toolbar button {
    padding: 6px 12px;
    margin: 0 4px;
    font-size: 14px;
  }
  .scroll-container {
    width: 100%;
    overflow-x: auto;
    border: 1px solid #444;
    padding: 10px;
    box-sizing: border-box;
    touch-action: pan-x pan-y;
  }
  .zoom-wrapper {
    transform-origin: top left;
    transition: transform 0.2s ease;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(11, 80px);
    grid-template-rows: repeat(3, 60px);
    gap: 6px;
    width: max-content;
  }
  .cell {
    border: 1px solid #444;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background: #f8f8f8;
    user-select: none;
  }
  .cell.active {
    outline: 3px solid #0077ff;
    background: rgba(0,120,255,0.15);
  }
</style>
</head>

<body>

<div class="toolbar">
  <button id="zoomIn">Zoom +</button>
  <button id="zoomOut">Zoom −</button>
  <button id="zoomReset">Reset</button>
</div>

<div class="scroll-container">
  <div id="zoomWrapper" class="zoom-wrapper">
    <div id="grid" class="grid"></div>
  </div>
</div>

<script>
// ------------------------------------------------------
// Zoom
// ------------------------------------------------------
let zoom = 1;

function applyZoom(){
  document.getElementById("zoomWrapper").style.transform = `scale(${zoom})`;
}

document.getElementById("zoomIn").onclick = () => {
  zoom = Math.min(zoom + 0.1, 3);
  applyZoom();
};

document.getElementById("zoomOut").onclick = () => {
  zoom = Math.max(zoom - 0.1, 0.3);
  applyZoom();
};

document.getElementById("zoomReset").onclick = () => {
  zoom = 1;
  applyZoom();
};

// ------------------------------------------------------
// Grid Renderer
// ------------------------------------------------------
function render3x11(mask){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let r=1; r<=3; r++){
    for(let c=1; c<=11; c++){
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.id = `cell-${r}-${c}`;

      const hit = mask.find(s => s.pos[0] === r && s.pos[1] === c);

      if(hit){
        cell.textContent = hit.refs.join(", ");
      }

      grid.appendChild(cell);
    }
  }
}

// ------------------------------------------------------
// Movement Engine
// ------------------------------------------------------
let active = { r: 1, c: 1 };

function highlightActive(){
  document.querySelectorAll(".cell").forEach(c => c.classList.remove("active"));
  const el = document.getElementById(`cell-${active.r}-${active.c}`);
  if(el) el.classList.add("active");
}

function move(dir){
  const rows = 3;
  const cols = 11;

  if(dir === "left")  active.c = (active.c - 1 + cols) % cols || cols;
  if(dir === "right") active.c = (active.c % cols) + 1;
  if(dir === "up")    active.r = (active.r - 1 + rows) % rows || rows;
  if(dir === "down")  active.r = (active.r % rows) + 1;

  highlightActive();
}

highlightActive();

document.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft")  move("left");
  if(e.key === "ArrowRight") move("right");
  if(e.key === "ArrowUp")    move("up");
  if(e.key === "ArrowDown")  move("down");
});

// ------------------------------------------------------
// FULL RESPO VIEWER (REAL + BIL)
// ------------------------------------------------------

const RESPO_NAMES = ["REAL", "BIL"];

async function loadRespo(name){
  try {
    const r = await fetch(name + ".json");
    return await r.json();
  } catch(e){
    return { NAME:name, MISS:true };
  }
}

async function buildMask(){
  const mask = [];

  for(const n of RESPO_NAMES){
    const res = await loadRespo(n);

    if(res.MISS){
      mask.push({
        pos: [1,1],
        refs: [n + " MISSING"]
      });
      continue;
    }

    mask.push({
      pos: [res.RAUM.X, res.RAUM.Z],
      refs: [res.NAME]
    });
  }

  return mask;
}

buildMask().then(mask => render3x11(mask));

</script>

</body>
</html>
