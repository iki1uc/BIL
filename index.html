<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GHOST-SCAN – Systemlage</title>

<style>
  body { font-family: Arial; background:#111; color:#eee; }
  h1 { text-align:center; }
  .respo-box {
    border:1px solid #444;
    padding:10px;
    margin:10px;
    background:#222;
  }
  .ok { color:#00ff88; }
  .help { color:#ffcc00; }
  .error { color:#ff4444; }
</style>
</head>

<body>

<h1>GHOST‑SCAN – Systemlage</h1>

<div id="output"></div>

<script>
// ------------------------------------------------------
// RESPO-Liste (ALLE Cluster)
// ------------------------------------------------------
const RESPO_NAMES = [
  "REAL",
  "BIL"
];

// ------------------------------------------------------
// Loader
// ------------------------------------------------------
async function loadRespo(name){
  try {
    const res = await fetch(name + ".json");   // FIXED
    return await res.json();
  } catch(e){
    return { NAME:name, MISS:true };
  }
}

async function loadAllRespos(){
  const respos = [];
  for(const n of RESPO_NAMES){
    respos.push(await loadRespo(n));
  }
  return respos;
}

// ------------------------------------------------------
// Dummy GHOST-SCAN (weil fin.e.js fehlt)
// ------------------------------------------------------
function GHOST_SCAN_REAL(r){
  return {
    NAME: r.NAME,
    ID: r.ID,
    RAUM: r.RAUM,
    STATUS: r.STATUS,
    RESULT: r.SOLL === "aktiv" ? "OK" : "HELFEN",
    OUT: r.VERWALTUNG3,
    WAHRHEIT: r.WAHRHEIT,
    IST_IST: r.IST_IST
  };
}

// ------------------------------------------------------
// Renderer
// ------------------------------------------------------
function renderScan(scan){
  const out = document.getElementById("output");
  out.innerHTML = "";

  scan.forEach(r => {
    const box = document.createElement("div");
    box.className = "respo-box";

    let statusClass = "ok";
    if(r.RESULT === "HELFEN") statusClass = "help";
    if(r.MISS === true) statusClass = "error";

    box.innerHTML = `
      <h2 class="${statusClass}">${r.NAME}</h2>
      <p><b>ID:</b> ${r.ID}</p>
      <p><b>LAGE:</b> ${JSON.stringify(r.RAUM)}</p>
      <p><b>STATUS:</b> ${r.STATUS}</p>
      <p><b>RESULT:</b> ${r.RESULT}</p>
      <p><b>OUT:</b> ${JSON.stringify(r.OUT)}</p>
      <p><b>REAL:</b> ${r.WAHRHEIT}</p>
      <p><b>EDIT:</b> ${r.IST_IST}</p>
    `;

    out.appendChild(box);
  });
}

// ------------------------------------------------------
// Start
// ------------------------------------------------------
loadAllRespos().then(respos => {
  const scan = respos.map(r => GHOST_SCAN_REAL(r));
  renderScan(scan);
});
</script>

</body>
</html>
